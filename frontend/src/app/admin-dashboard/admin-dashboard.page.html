<ion-header>
  <ion-toolbar color="danger">
    <ion-title>MDRRMO Dispatch</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h2>Active Emergencies</h2>
  
  <!-- This will be empty until we connect the Laravel API -->
  <div *ngIf="activeRequests.length === 0" class="empty-state">
    <p>No active emergency requests in San Isidro at this time.</p>
  </div>

  <ion-list *ngIf="activeRequests.length > 0">
    <ion-card *ngFor="let request of activeRequests">
      <ion-card-header>
        <ion-card-subtitle>{{ request.request_time | date:'short' }}</ion-card-subtitle>
        <ion-card-title color="danger">{{ request.incident_type }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p><strong>Victim:</strong> {{ request.user_name }}</p>
        <p><strong>Location:</strong> {{ request.barangay_name }}</p>
        <ion-button expand="block" color="warning" class="ion-margin-top">
          Dispatch Responders
        </ion-button>
      </ion-card-content>
    </ion-card>
  </ion-list>
</ion-content>
