<ion-header>
  <ion-toolbar color="danger">
    <ion-buttons slot="start">
      <ion-menu-button style="color: white;"></ion-menu-button>
    </ion-buttons>
    <ion-title style="color: white;">SAN ISIDRO N.E. MDRRMO</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding ion-text-center">
  
  <div class="ion-margin-bottom ion-padding" style="background-color: var(--ion-color-light); border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
    <h2 style="margin-top: 0;">Stay Safe, {{ userFullName }}</h2>
    <p class="ion-color-medium" style="margin-bottom: 0;">San Isidro Emergency Portal</p>
  </div>

  <div class="sos-container">
    <button class="sos-button" (click)="goToSos()">
      EMERGENCY<br>SOS
    </button>
  </div>

  <ion-list class="ion-margin-top ion-text-left">
    <ion-list-header>
      <ion-label>Latest Request</ion-label>
    </ion-list-header>
    
    <div *ngIf="recentRequests.length === 0" class="ion-padding ion-text-center ion-color-medium">
      <p>No active emergencies.</p>
    </div>

    @for (req of recentRequests; track req.request_id) {
      <ion-card>
        <ion-item lines="none">
          <ion-label>
            <h2>{{ req.incident_name }} Emergency</h2>
            <p>{{ req.request_time | date:'short' }}</p>
          </ion-label>
          <ion-badge [color]="req.status === 'Pending' ? 'warning' : (req.status === 'Cancelled' ? 'medium' : 'success')" slot="end">
            {{ req.status }}
          </ion-badge>
        </ion-item>
        
        <ion-button *ngIf="req.status === 'Pending'" fill="clear" color="medium" expand="block" (click)="cancelRequest(req.request_id)">
          <ion-icon name="close-circle-outline" slot="start"></ion-icon>
          Cancel Request
        </ion-button>
      </ion-card>
    }
  </ion-list>
</ion-content>
