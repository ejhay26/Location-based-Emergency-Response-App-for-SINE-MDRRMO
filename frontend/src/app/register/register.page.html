<ion-header>
  <ion-toolbar color="danger">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Citizen Registration</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <div class="ion-text-center ion-margin-bottom">
    <ion-text color="medium">Step {{ currentStep }} of 3</ion-text>
    <ion-progress-bar [value]="currentStep / 3" color="danger"></ion-progress-bar>
  </div>

  <div *ngIf="currentStep === 1">
    <ion-list>
      <ion-item>
        <ion-input label="First Name" labelPlacement="floating" [(ngModel)]="userData.first_name" required></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Last Name" labelPlacement="floating" [(ngModel)]="userData.last_name" required></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Phone Number" labelPlacement="floating" type="tel" [(ngModel)]="userData.phone" required></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Birthdate" labelPlacement="floating" type="date" [(ngModel)]="userData.birthdate" required></ion-input>
      </ion-item>
    </ion-list>
    <ion-button expand="block" color="danger" class="ion-margin-top" (click)="nextStep()">Next</ion-button>
  </div>

  <div *ngIf="currentStep === 2">
    <ion-list>
      <ion-item>
        <ion-select label="Barangay" labelPlacement="floating" [(ngModel)]="userData.barangay_id" required>
          <ion-select-option *ngFor="let b of barangays" [value]="b.id">{{ b.name }}</ion-select-option>
        </ion-select>
      </ion-item>
      <ion-item>
        <ion-input label="Username" labelPlacement="floating" type="text" [(ngModel)]="userData.username" required></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Email Address" labelPlacement="floating" type="email" [(ngModel)]="userData.email" required></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Password" labelPlacement="floating" type="password" [(ngModel)]="userData.password" required>
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Confirm Password" labelPlacement="floating" type="password" [(ngModel)]="userData.confirm_password" required>
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>
    </ion-list>
    <p style="font-size: 12px; color: gray; text-align: center;">Password must be 8+ chars with uppercase, lowercase, number, & symbol.</p>
    
    <ion-row class="ion-margin-top">
      <ion-col><ion-button expand="block" fill="outline" color="danger" (click)="prevStep()">Back</ion-button></ion-col>
      <ion-col><ion-button expand="block" color="danger" (click)="nextStep()">Send Verification</ion-button></ion-col>
    </ion-row>
  </div>

  <div *ngIf="currentStep === 3" class="ion-text-center">
    <ion-icon name="mail-unread-outline" style="font-size: 64px; color: var(--ion-color-danger)"></ion-icon>
    <h2>Check Your Email</h2>
    <p>We sent a 4-digit verification code to <br><strong>{{ userData.email }}</strong></p>
    
    <ion-item class="ion-margin-top">
      <ion-input class="ion-text-center" style="font-size: 24px; letter-spacing: 10px;" 
                 type="number" placeholder="0000" [(ngModel)]="otpCode"></ion-input>
    </ion-item>
    
    <ion-button expand="block" color="success" class="ion-margin-top" (click)="verifyOtp()">Verify & Login</ion-button>
  </div>

</ion-content>
