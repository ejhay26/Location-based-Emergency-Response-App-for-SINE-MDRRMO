<ion-app>
  <ion-menu contentId="main-content" type="overlay" (ionWillOpen)="menuOpened()">
    
    <ion-header>
      <ion-toolbar color="danger">
        <ion-title>Main Menu</ion-title>
        <ion-buttons slot="end">
          <ion-menu-toggle auto-hide="false">
            <ion-button>
              <ion-icon slot="icon-only" name="close-outline"></ion-icon>
            </ion-button>
          </ion-menu-toggle>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <div class="ion-padding ion-text-center" style="background: var(--ion-color-light); border-bottom: 1px solid var(--ion-color-step-150, #ddd);">
        <ion-icon name="person-circle-outline" color="danger" style="font-size: 80px;"></ion-icon>
        <h2 style="margin-bottom: 0;">{{ userFullName }}</h2>
        <p style="margin-top: 5px; color: gray;">{{ userRole }}</p>
        
        <ion-menu-toggle auto-hide="false">
          <ion-button fill="clear" color="danger" size="small" routerLink="/profile">
            My Account
          </ion-button>
        </ion-menu-toggle>
      </div>

      <ion-list lines="none">
        
        <ion-menu-toggle auto-hide="false">
          <ion-item button routerLink="/home">
            <ion-icon slot="start" name="home-outline" color="danger"></ion-icon>
            <ion-label>Dashboard</ion-label>
          </ion-item>
        </ion-menu-toggle>
        
        <ion-item>
          <ion-icon slot="start" name="moon-outline" color="danger"></ion-icon>
          <ion-label>Dark Mode</ion-label>
          <ion-toggle slot="end" color="danger" (ionChange)="toggleDarkMode($event)" [checked]="isDarkMode"></ion-toggle>
        </ion-item>
      </ion-list>
    </ion-content>

    <ion-footer>
      <ion-toolbar>
        <ion-menu-toggle auto-hide="false">
          <ion-button expand="block" fill="clear" color="danger" (click)="logout()">
            <ion-icon slot="start" name="log-out-outline"></ion-icon>
            Logout
          </ion-button>
        </ion-menu-toggle>
      </ion-toolbar>
    </ion-footer>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
