version: '3.8'

services:
  # 1. The MariaDB Database
  db:
    image: mariadb:10.11
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: emergencydb
    volumes:
      # This automatically imports your SQL file on the first run!
      - ./database/emergencydb.sql:/docker-entrypoint-initdb.d/init.sql
      # This saves your database data so it isn't lost when Docker stops
      - db_data:/var/lib/mysql

  # 2. The Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db

  # 3. The Ionic Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    volumes:
      - ./frontend:/app
      # This prevents Docker from overwriting your local node_modules
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data: